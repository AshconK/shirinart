<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery — ShirinArt</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="page">
  <header class="nav nav--solid">
    <a href="/" class="wordmark">SHIRIN<span class="wordmark__art">art</span></a>
    <nav class="nav__links" aria-label="Primary">
      <a href="/">Home</a>
      <a href="/gallery.html">Gallery</a>
      <a href="/about.html">About</a>
      <a href="/contact.html">Contact</a>
    </nav>
    <button class="cart-toggle" id="cartToggle" aria-label="Open cart">
      <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
        <path d="M3 4h2l2.4 11.2a1.6 1.6 0 0 0 1.57 1.3h7.9a1.6 1.6 0 0 0 1.56-1.24L21 8H6.2"
              fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="9.5" cy="20" r="1.3" fill="currentColor"/>
        <circle cx="17" cy="20" r="1.3" fill="currentColor"/>
      </svg>
      <span class="cart-toggle__count" id="cartCount" hidden>0</span>
    </button>
  </header>

  <main class="page-wrap page-wrap--wide">
    <section class="page-hero">
      <p class="section-head__label">The Collection</p>
      <h1 class="page-hero__title">Every available work</h1>
      <p class="page-hero__sub">Each painting is an original — once it sells, it's gone.</p>
    </section>
    <div id="grid"></div>
  </main>

  <!-- Cart drawer (same as home) -->
  <div class="drawer-overlay" id="drawerOverlay" hidden></div>
  <aside class="drawer" id="drawer" aria-label="Your cart" aria-hidden="true">
    <header class="drawer__head">
      <h2 class="drawer__title">Your selection</h2>
      <button class="drawer__close" id="drawerClose" aria-label="Close cart">&times;</button>
    </header>
    <div class="drawer__body" id="drawerBody"></div>
    <footer class="drawer__foot">
      <div class="drawer__total"><span>Total</span><span id="cartTotal">$0.00</span></div>
      <button class="btn btn--solid btn--block" id="checkoutBtn" disabled>Proceed to checkout</button>
      <p class="drawer__note" id="drawerNote"></p>
    </footer>
  </aside>

  <script src="/app.js"></script>
</body>
</html>
